<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PacVu Package Library Work - Viewer v1</title>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    .row select { width:100%; padding:4px 6px; border-radius:4px; border:1px solid #ddd; font-size:11px; background:#fff; }
    .row select:focus { outline:none; border-color:#cc0000; }
  </style>
</head>
<body>
  <div class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <h1>PacVu Package Library Work</h1>
        <p class="sub">Package Library · 2D Dieline Work Dashboard</p>
        <div class="top-actions">
          <button class="btn light" id="toggleSidebarBtn">숨기기</button>
          <button class="btn sec"   id="downloadSvgBtn">SVG</button>
          <button class="btn sec"   id="downloadDxfBtn">DXF</button>
        </div>

        <details class="group" open>
          <summary>패키지 라이브러리</summary>
          <div class="group-body">
            <div class="row">
              <label>Box Category</label>
              <select id="boxCategory"><option value="">선택</option></select>
            </div>
            <div class="row">
              <label>Box Type</label>
              <select id="boxType"><option value="">선택</option></select>
            </div>
          </div>
        </details>

        <details class="group" open>
          <summary>박스 기본 치수</summary>
          <div class="group-body">
            <div class="row"><label>Width (W)</label><input id="baseW" type="number" step="1" value="235"></div>
            <div class="row"><label>Depth (D)</label><input id="baseD" type="number" step="1" value="229"></div>
            <div class="row"><label>Height (H)</label><input id="panelH" type="number" step="1" value="91"></div>
          </div>
        </details>

        <details class="group" open>
          <summary>표시옵션</summary>
          <div class="group-body">
            <div class="option-grid">
              <label><span>끈구멍</span><input id="showHoles"  type="checkbox" checked></label>
              <label><span>폴딩라인</span><input id="showFolds" type="checkbox" checked></label>
              <label><span>사이즈</span><input id="showDims"   type="checkbox" checked></label>
              <label><span>라벨</span><input id="showLabels"   type="checkbox" checked></label>
            </div>
            <div class="mini-title">끈구멍 설정</div>
            <div class="row"><label>Hole Ø</label><input id="holeDia"     type="number" step="0.5" value="6"></div>
            <div class="row"><label>Hole Gap</label><input id="holeGap"   type="number" step="1"   value="70"></div>
            <div class="row"><label>Offset Y</label><input id="holeOffsetY" type="number" step="0.5" value="45"></div>
          </div>
        </details>

        <div class="hint">외곽선 / 접는선 / 슬롯 / 끈구멍 등 구조확인 작업화면</div>
      </div>
    </aside>

    <main class="viewer-wrap">
      <div class="toolbar">
        <button class="btn light" id="showSidebarBtn">설정</button>
        <button class="btn light" id="fitBtn">중앙</button>
        <button class="btn light" id="zoomInBtn">＋</button>
        <button class="btn light" id="zoomOutBtn">－</button>
      </div>
      <div class="legend">
        <div><span class="ln" style="background:#c00;"></span>톰슨선 (외곽컷)</div>
        <div><span class="ln" style="background:#1d6fe8; border-top:2px dashed #1d6fe8;"></span>접는선</div>
        <div><span class="ln" style="background:#e53935;"></span>슬롯</div>
        <div><span class="ln" style="background:#1f8f4f;"></span>끈구멍</div>
      </div>
      <div class="status" id="statusBox">Zoom 100%</div>
      <div id="svgHost"></div>
    </main>
  </div>

  <!-- external -->
  <script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.js"></script>

  <!-- M001: G-Type Mailer -->
  <script src="./structures/mailer/M001/M001_spec.js"></script>
  <script src="./structures/mailer/M001/M001_layout.js"></script>
  <script src="./structures/mailer/M001/M001_renderer.js"></script>

  <!-- T001: B-Type Tuck -->
  <script src="./structures/tuck/T001/T001_spec.js"></script>
  <script src="./structures/tuck/T001/T001_layout.js"></script>
  <script src="./structures/tuck/T001/T001_renderer.js"></script>

  <!-- R001: A-Type RSC Shipping -->
  <script src="./structures/shipping/rsc/R001/R001_spec.js"></script>
  <script src="./structures/shipping/rsc/R001/R001_layout.js"></script>
  <script src="./structures/shipping/rsc/R001/R001_renderer.js"></script>

  <!-- export -->
  <script src="./export/svgExport.js"></script>
  <script src="./export/dxfExport.js"></script>

  <!-- app (entry point) -->
  <script src="./app.js"></script>
</body>
</html>
